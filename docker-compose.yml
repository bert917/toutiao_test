version: "3.8"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
      MYSQL_DATABASE: news_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql+aiomysql://root:my-secret-pw@db:3306/news_app?charset=utf8mb4
    command: >
      sh -c "
        until python -c \"import aiomysql; import asyncio; asyncio.run(aiomysql.connect(host='db', port=3306, user='root', password='my-secret-pw', db='news_app'))\" 2>/dev/null; do
          echo 'Waiting for MySQL...'; sleep 2
        done;
        uvicorn main:app --host 0.0.0.0 --port 8000
      "

volumes:
  mysql_data:
